name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hanexis
          POSTGRES_PASSWORD: hanexis
          POSTGRES_DB: hanexis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hanexis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Lint
        run: npm run lint --if-present

      - name: Type-check (web)
        working-directory: apps/web
        run: npm run type-check

      - name: Test (api)
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://hanexis:hanexis@localhost:5432/hanexis_test?schema=public
          REDIS_HOST: localhost
          JWT_SECRET: test-secret
        run: npm test --if-present

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: hanexis-api:latest
      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: hanexis-web:latest
